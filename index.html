<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker with Charts</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- Header Section -->
    <header>
        <h1>My Fitness Tracker</h1>
        <p>Track Your Fitness Goals Daily</p>
    </header>

    <!-- Navigation Bar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Track Activity</a>
        <a href="#">Progress History</a>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Input Section -->
        <div class="card">
            <h2>Track Your Daily Progress</h2>
            <form id="fitness-form">
                <label for="date">Date:</label>
                <input type="date" id="date-input" required>

                <label for="steps">Steps Taken:</label>
                <input type="number" id="steps-input" placeholder="Enter steps" required>

                <label for="calories">Calories Burned (kcal):</label>
                <input type="number" id="calories-input" placeholder="Enter calories" required>

                <label for="water">Water Intake (litres):</label>
                <input type="number" id="water-input" placeholder="Enter glasses of water" required>

                <label for="exercise">Exercise Minutes:</label>
                <input type="number" id="active-input" placeholder="Enter active minutes" required>

                <button type="submit">Save Progress</button>
            </form>
        </div>

        <!-- Progress History Section -->
        <div class="card">
            <h2>Progress History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Steps</th>
                        <th>Calories</th>
                        <th>Water</th>
                        <th>Active Minutes</th>
                    </tr>
                </thead>
                <tbody id="history-table">
                    <!-- Data dynamically inserted here -->
                </tbody>
            </table>
        </div>

        <!-- Data Visualization Section -->
        <div class="card">
            <h2>Fitness Progress Chart</h2>
            <canvas id="fitnessChart"></canvas>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Fitness Tracker | Designed by Astha Bisoi
        </p>
    </footer>

    <!-- Link to External JavaScript -->
    <script src="script.js"></script>
</body>

</html>
